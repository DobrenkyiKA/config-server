server:
  port: 8888

spring:
  application:
    name: config-server

  cloud:
    config:
      server:
        native:
          search-locations: file:${CONFIG_REPO_PATH:../config-repo}
        git:
          uri: ${CONFIG_GIT_URI:}
          default-label: ${CONFIG_GIT_BRANCH:main}
          clone-on-start: true
          username: ${CONFIG_GIT_USERNAME:}
          password: ${CONFIG_GIT_PASSWORD:}

eureka:
  client:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.kdob: DEBUG
    org.springframework.cloud.config: DEBUG